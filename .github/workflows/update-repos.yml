name: Update repos

on:
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Fetch org repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run fetch:repos
      - name: Commit if changed
        run: |
          if git diff --quiet -- content/projects/github.generated.json; then
            echo "No repo changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/projects/github.generated.json
            git commit -m "chore: update project repos"
            git push origin main
          fi
