on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
name: 🚀 Deploy LaBackDoor on push

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: 🔧 Set up Node.js 20.17.0
        uses: actions/setup-node@v4
        with:
          node-version: '20.17.0'
          cache: 'pnpm'

      - name: 🔨 Build Project
        run: |
          pnpm install
          pnpm run build

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.GIT_CPANEL_REACT_SERVER }}
          username: ${{ secrets.GIT_CPANEL_REACT_USER }}
          password: ${{ secrets.GIT_CPANEL_REACT_PWD }}
          protocol: ${{ secrets.GIT_CPANEL_REACT_PROTOCOL }}
          local-dir: ./dist/
