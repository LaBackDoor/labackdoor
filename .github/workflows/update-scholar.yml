name: Update Scholar publications

on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch Scholar publications
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: bun run fetch:scholar

      - name: Commit if changed
        run: |
          if git diff --quiet -- content/publications/scholar.generated.json; then
            echo "No publication changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/publications/scholar.generated.json
            git commit -m "chore: update Scholar publications"
            git push origin main
          fi
